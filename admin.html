<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - Spedia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .admin-nav button {
            padding: 12px 25px;
            border: none;
            background: transparent;
            color: #6a7c92;
            cursor: pointer;
            font-weight: 800;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        .admin-nav button:hover {
            background: #f4f7fa;
            color: #121e33;
        }

        .admin-nav button.active {
            background: linear-gradient(135deg, #12b8c5, #1e3c72);
            color: #fff;
            box-shadow: 0 5px 15px rgba(18, 184, 197, 0.3);
        }

        .admin-section {
            display: none;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .admin-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #121e33;
            font-size: 15px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            transition: 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #12b8c5;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(18, 184, 197, 0.1);
        }

        /* Modern Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 15px;
        }

        table th {
            background: transparent;
            color: #6a7c92;
            padding: 10px 20px;
            text-align: right;
            font-weight: 800;
            border: none;
        }

        table td {
            background: #fff;
            padding: 15px 20px;
            text-align: right;
            border: none;
            color: #121e33;
            font-weight: 600;
        }

        table tr td:first-child {
            border-radius: 0 15px 15px 0;
            border-right: 5px solid #12b8c5;
        }

        table tr td:last-child {
            border-radius: 15px 0 0 15px;
        }

        table tr {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
            transition: 0.3s;
        }

        table tr:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .admin-title {
            font-size: 24px;
            font-weight: 900;
            color: #121e33;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        .admin-title i {
            color: #12b8c5;
        }
    </style>
</head>

<body class="dashboard-body" style="background:#f0f4f8;">
    <div class="container"
        style="padding:30px; max-width:900px; margin:40px auto; background:#fff; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.08);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1
                style="color:var(--primary-color); font-weight:900; font-size:24px; display:flex; align-items:center; gap:10px;">
                <img src="media__1778617038143.jpg" alt="Logo" style="width:40px; height:40px; border-radius:50%;">
                <span>حصون - لوحة الإدارة العامة</span>
            </h1>
            <button onclick="window.location.href='index.html'" class="btn-primary"
                style="background:#f44336; padding: 10px 20px; font-size: 16px;">خروج
                للرئيسية</button>
        </div>

        <div class="admin-nav">
            <button class="active" onclick="showSection('tab-codes', this)">إدارة الأكواد</button>
            <button onclick="showSection('tab-users', this)">الطلاب المسجلين</button>
            <button onclick="showSection('tab-attendance', this)">الحضور والتقييمات</button>
            <button onclick="showSection('tab-content', this)">المحتوى والكورسات</button>
            <button onclick="showSection('tab-exams', this)">إضافة امتحانات</button>
            <button onclick="showSection('tab-results', this)">نتائج الاختبارات</button>
        </div>

        <!-- Sections Content (Same as before but with working forms) -->
        <div id="tab-codes" class="admin-section active">
            <h2>إنشاء كود عشوائي جديد</h2>
            <button onclick="generateCode()" class="btn-primary mt-10">إنشاء كود</button>
            <h3 class="mt-20">الأكواد الحالية بالنظام</h3>
            <div style="overflow-x:auto;">
                <table id="table-codes"></table>
            </div>
        </div>

        <div id="tab-users" class="admin-section">
            <h2>الطلاب المسجلين</h2>
            <div style="overflow-x:auto;">
                <table id="table-users"></table>
            </div>
        </div>

        <div id="tab-attendance" class="admin-section">
            <h2>سجل الحضور</h2>
            <div style="overflow-x:auto; margin-bottom:30px;">
                <table id="table-attendance"></table>
            </div>

            <h2>إضافة تقييم للطالب</h2>
            <form onsubmit="window.addEval(event)">
                <div class="form-group">
                    <label>كود الطالب</label>
                    <input type="text" id="ev-code" required>
                </div>
                <div class="form-group">
                    <label>التقييم أو الملاحظة</label>
                    <input type="text" id="ev-note" required placeholder="مثال: ممتاز في الفيزياء">
                </div>
                <button type="submit" class="btn-primary w-100">إرسال التقييم</button>
            </form>
        </div>

        <div id="tab-content" class="admin-section">
            <h2>إضافة مادة أو كورس</h2>
            <form onsubmit="window.addContent(event)">
                <div class="form-group">
                    <label>النوع</label>
                    <select id="ct-type" onchange="
                        document.getElementById('course-code-container').style.display = this.value === 'course' ? 'block' : 'none';
                        document.getElementById('yt-container').style.display = this.value === 'course' ? 'block' : 'none';
                        document.getElementById('img-container').style.display = this.value === 'course' ? 'none' : 'block';
                        ">
                        <option value="book">كتاب متاح للطلب</option>
                        <option value="course">كورس واشتراك (فيديو يوتيوب)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عنوان المحتوى</label>
                    <input type="text" id="ct-title" required>
                </div>
                <div class="form-group" id="course-code-container" style="display:none;">
                    <label>كود التفعيل (كلمة المرور)</label>
                    <input type="text" id="ct-course-code">
                </div>
                <div class="form-group">
                    <label>الدولة</label>
                    <select id="ct-country" required
                        onchange="if(window.updateCountryStages) window.updateCountryStages('ct-country', 'ct-stage', 'ct-grade')">
                        <option value="ALL">جميع الدول</option>
                        <option value="KW">الكويت</option>
                        <option value="SA">السعودية</option>
                        <option value="AE">الإمارات</option>
                        <option value="QA">قطر</option>
                        <option value="OM">عمان</option>
                        <option value="EG">مصر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المرحلة</label>
                    <select id="ct-stage"
                        onchange="if(window.updateGrades) window.updateGrades('ct-country', 'ct-stage', 'ct-grade')">
                        <option value="">اختر الدولة أولاً</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الصف</label>
                    <select id="ct-grade" required>
                        <option value="">اختر المرحلة أولاً</option>
                    </select>
                </div>
                <div class="form-group" id="img-container">
                    <label>رفع صورة غلاف (اختياري)</label>
                    <input type="file" id="ct-image" accept="image/*">
                </div>
                <div class="form-group" id="yt-container" style="display:none;">
                    <label>رابط فيديو يوتيوب</label>
                    <input type="url" id="ct-yt">
                </div>
                <div class="form-group">
                    <label>السعر الأساسي (ج.م)</label>
                    <input type="number" id="ct-price" required>
                </div>
                <button type="submit" class="btn-primary w-100">حفظ المحتوى</button>
            </form>
        </div>

        <div id="tab-exams" class="admin-section">
            <h2>إضافة امتحان</h2>
            <form onsubmit="window.addExam(event)">
                <div class="form-group">
                    <label>الدولة</label>
                    <select id="ex-country" required
                        onchange="if(window.updateCountryStages) window.updateCountryStages('ex-country', 'ex-stage', 'ex-grade')">
                        <option value="EG">مصر</option>
                        <option value="KW">الكويت</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المرحلة</label>
                    <select id="ex-stage"
                        onchange="if(window.updateGrades) window.updateGrades('ex-country', 'ex-stage', 'ex-grade')">
                        <option value="">اختر الدولة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الصف</label>
                    <select id="ex-grade" required></select>
                </div>
                <div class="form-group">
                    <label>عنوان الامتحان</label>
                    <input type="text" id="ex-title" required>
                </div>
                <div class="form-group">
                    <label>نوع التكليف</label>
                    <select id="ex-type">
                        <option value="exam">امتحان</option>
                        <option value="quiz">اختبار قصير</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المدة (دقائق)</label>
                    <input type="number" id="ex-time" value="60">
                </div>
                <div class="form-group">
                    <label>تاريخ البدء</label>
                    <input type="datetime-local" id="ex-start" required>
                </div>
                <div class="form-group">
                    <label>تاريخ الانتهاء</label>
                    <input type="datetime-local" id="ex-end" required>
                </div>
                <div id="dynamic-questions-container"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button type="button" onclick="addQuestionField('mcq')" class="btn-primary" style="flex:1;">+ اختيار
                        من متعدد</button>
                    <button type="button" onclick="addQuestionField('tf')" class="btn-primary" style="flex:1;">+
                        صح/خطأ</button>
                    <button type="button" onclick="addQuestionField('essay')" class="btn-primary" style="flex:1;">+
                        مقالي</button>
                </div>
                <button type="submit" class="btn-primary w-100 mt-20">نشر الامتحان</button>
            </form>
        </div>

        <div id="tab-results" class="admin-section">
            <h2>سجل حلول الطلاب</h2>
            <table id="table-submitted-exams"></table>
        </div>
    </div>

    <!-- Grading Modal -->
    <div id="grading-modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:20000; justify-content:center; align-items:center;">
        <div
            style="background:#fff; width:90%; max-width:600px; border-radius:20px; padding:30px; max-height:80vh; overflow-y:auto;">
            <h3>تصحيح إجابات: <span id="grad-student-name"></span></h3>
            <div id="grad-questions-container"></div>
            <button onclick="submitGrading()" class="btn-primary w-100" style="margin-top:20px;">اعتماد النتيجة</button>
            <button onclick="document.getElementById('grading-modal').style.display='none'" class="btn-primary w-100"
                style="background:#888; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="firebase-data.js"></script>
    <script src="script.js"></script>
    <script>
        function showSection(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        window.addEval = async function (e) {
            e.preventDefault();
            let code = document.getElementById('ev-code').value;
            let note = document.getElementById('ev-note').value;
            let newUserEval = { code, note, date: new Date().toLocaleDateString('ar-EG') };

            let evals = JSON.parse(localStorage.getItem('spedia_evals') || '[]');
            evals.push(newUserEval);
            localStorage.setItem('spedia_evals', JSON.stringify(evals));
            alert('تم إضافة التقييم!');
            e.target.reset();
        }

        async function renderTables() {
            let codes = JSON.parse(localStorage.getItem('spedia_codes') || '[]');
            let users = [];
            let att = [];
            if (window.fsData) {
                users = await window.fsData.getAllUsers();
                att = await window.fsData.getAttendance();
            } else {
                users = JSON.parse(localStorage.getItem('spedia_users') || '[]');
                att = JSON.parse(localStorage.getItem('spedia_attendance') || '[]');
            }
            let subs = [];
            if (window.fsData) {
                subs = await window.fsData.getAllSubmissions();
            } else {
                subs = JSON.parse(localStorage.getItem('spedia_submissions') || '[]');
            }
            let adminType = sessionStorage.getItem('adminType');

            const tCodes = document.getElementById('table-codes');
            if (tCodes) tCodes.innerHTML = `<tr><th>الكود</th><th>مستخدم؟</th></tr>` + codes.map(c => `<tr><td>${c.code}</td><td style="color:${c.isUsed ? 'red' : 'green'}">${c.isUsed ? 'مستخدم' : 'متاح'}</td></tr>`).join('');

            const tUsers = document.getElementById('table-users');
            if (tUsers) tUsers.innerHTML = `<tr><th>الكود</th><th>الاسم</th><th>الهاتف</th><th>الصف</th></tr>` + users.map(u => `<tr><td>${u.code}</td><td>${u.name}</td><td>${adminType === 'restricted' ? '********' : u.phone}</td><td>${u.grade}</td></tr>`).join('');

            const tAtt = document.getElementById('table-attendance');
            if (tAtt) tAtt.innerHTML = `<tr><th>الكود</th><th>الاسم</th><th>التاريخ</th><th>الوقت</th></tr>` + att.map(a => `<tr><td>${a.code}</td><td>${a.name}</td><td>${a.date}</td><td>${a.time}</td></tr>`).join('');

            const tExams = document.getElementById('table-submitted-exams');
            if (tExams) tExams.innerHTML = `<tr><th>الطالب</th><th>الامتحان</th><th>الحالة</th><th>تصحيح</th></tr>` + subs.map(s => `<tr><td>${s.name || s.code}</td><td>${s.examTitle}</td><td>${s.status}</td><td><button onclick="openGrading('${s.code}', '${s.examTitle}')" style="padding:5px 10px;">فتح</button></td></tr>`).join('');
        }

        window.generateCode = function () {
            let rnd = "SPD-" + Math.floor(10000 + Math.random() * 90000);
            let codes = JSON.parse(localStorage.getItem('spedia_codes') || '[]');
            codes.push({ code: rnd, isUsed: false });
            localStorage.setItem('spedia_codes', JSON.stringify(codes));
            renderTables();
        }

        window.addContent = async function (e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            if (btn) btn.innerText = "جاري الحفظ...";

            try {
                let newItem = {
                    id: Date.now(),
                    type: document.getElementById('ct-type').value,
                    title: document.getElementById('ct-title').value,
                    grade: document.getElementById('ct-grade').value,
                    country: document.getElementById('ct-country').value,
                    priceBase: parseInt(document.getElementById('ct-price').value),
                    courseCode: document.getElementById('ct-course-code').value || ''
                };
                if (newItem.type === 'course') {
                    let yt = document.getElementById('ct-yt').value;
                    let m = yt.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                    newItem.youtubeId = m ? m[1] : '';
                    newItem.image = `https://img.youtube.com/vi/${newItem.youtubeId}/hqdefault.jpg`;
                } else {
                    newItem.image = "https://cdni.iconscout.com/illustration/premium/thumb/book-4113220-3406254.png";
                }

                if (window.fsData) await window.fsData.addContent(newItem);
                else {
                    let c = JSON.parse(localStorage.getItem('spedia_content') || '[]');
                    c.push(newItem);
                    localStorage.setItem('spedia_content', JSON.stringify(c));
                }
                alert('تم الحفظ بنجاح في النظام!');
                e.target.reset();
            } catch (err) {
                console.error(err);
                alert('حدث خطأ أثناء الحفظ. يرجى المحاولة لاحقاً.');
            } finally {
                if (btn) btn.innerText = "حفظ المحتوى";
            }
        }

        function addQuestionField(type) {
            let container = document.getElementById('dynamic-questions-container');
            let qDiv = document.createElement('div');
            qDiv.className = 'q-block';
            qDiv.dataset.type = type;
            qDiv.style.cssText = "background:#f8fafc; border:1px solid #e0e6ed; padding:15px; border-radius:10px; position:relative; margin-top:10px;";
            qDiv.innerHTML = `<button type="button" onclick="this.parentElement.remove()" style="position:absolute; top:5px; left:5px;">X</button>`;
            if (type === 'mcq') qDiv.innerHTML += `<input type="text" class="q-text" placeholder="السؤال" style="width:100%;"><div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;"><input type="text" class="q-opt" placeholder="الصح"><input type="text" class="q-opt" placeholder="2"><input type="text" class="q-opt" placeholder="3"><input type="text" class="q-opt" placeholder="4"></div>`;
            else if (type === 'tf') qDiv.innerHTML += `<input type="text" class="q-text" placeholder="العبارة" style="width:100%;"><select class="q-tf-answer"><option value="true">صح</option><option value="false">خطأ</option></select>`;
            else qDiv.innerHTML += `<input type="text" class="q-text" placeholder="السؤال" style="width:100%;">`;
            container.appendChild(qDiv);
        }

        window.addExam = async function (e) {
            e.preventDefault();
            try {
                let qs = [];
                document.querySelectorAll('.q-block').forEach(b => {
                    let t = b.dataset.type;
                    if (t === 'mcq') qs.push({ type: 'mcq', text: b.querySelector('.q-text').value, options: Array.from(b.querySelectorAll('.q-opt')).map(i => i.value) });
                    else if (t === 'tf') qs.push({ type: 'tf', text: b.querySelector('.q-text').value, answer: b.querySelector('.q-tf-answer').value });
                    else qs.push({ type: 'essay', text: b.querySelector('.q-text').value });
                });

                let exam = {
                    id: Date.now(),
                    title: document.getElementById('ex-title').value,
                    grade: document.getElementById('ex-grade').value,
                    country: document.getElementById('ex-country').value,
                    time: document.getElementById('ex-time').value,
                    questionsList: qs
                };
                if (window.fsData) await window.fsData.addExam(exam);
                else {
                    let ex = JSON.parse(localStorage.getItem('spedia_exams') || '[]');
                    ex.push(exam);
                    localStorage.setItem('spedia_exams', JSON.stringify(ex));
                }
                alert('تم نشر الامتحان بنجاح!');
                e.target.reset();
                document.getElementById('dynamic-questions-container').innerHTML = '';
            } catch (err) {
                alert('خطأ في نشر الامتحان');
            }
        }

        let currentSub = null;
        async function openGrading(code, title) {
            let subs = window.fsData ? await window.fsData.getAllSubmissions() : JSON.parse(localStorage.getItem('spedia_submissions') || '[]');
            currentSub = subs.find(s => s.code === code && s.examTitle === title);
            document.getElementById('grad-student-name').innerText = currentSub.name || code;
            document.getElementById('grad-questions-container').innerHTML = (currentSub.answers || []).map((a, i) => `
                <div style="margin-top:10px; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <p><b>س ${i + 1}:</b> ${a}</p>
                    <label><input type="radio" name="grad_q${i}" value="1"> صح</label>
                    <label><input type="radio" name="grad_q${i}" value="0"> خطأ</label>
                </div>
            `).join('');
            document.getElementById('grading-modal').style.display = 'flex';
        }

        async function submitGrading() {
            let total = currentSub.answers ? currentSub.answers.length : 1;
            let ok = 0;
            for (let i = 0; i < total; i++) {
                let sel = document.querySelector(`input[name="grad_q${i}"]:checked`);
                if (sel && sel.value === "1") ok++;
            }
            if (window.fsData) await window.fsData.addResult({ code: currentSub.code, examTitle: currentSub.examTitle, grade: `${ok}/${total}`, date: new Date().toLocaleDateString('ar-EG') });
            document.getElementById('grading-modal').style.display = 'none';
            alert('تم التصحيح!');
            renderTables();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('isAdmin') !== 'yes') window.location.href = 'index.html';
            else renderTables();
        });
    </script>
</body>

</html>
