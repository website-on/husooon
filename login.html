<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Spedia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .form-group label {
            text-align: right;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-wrapper animate-on-scroll">
        <div class="login-container">
            <div class="login-header">
                <a href="index.html" class="login-logo text-center"
                    style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:10px;">
                    <img src="media__1778617038143.jpg" alt="Logo"
                        style="width:100px; height:100px; border-radius:50%; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
                    <div class="logo-text">
                        <span class="ar"
                            style="font-size:32px; font-weight:900; color:var(--primary-color);">حصون</span>
                        <span class="en" style="color:var(--text-dark);">HUSOON</span>
                    </div>
                </a>
                <h2 style="margin-top:15px;">أهلاً بك في منصتنا!</h2>
                <p>سجل دخولك باستخدام كود الاشتراك</p>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align:right">
                    <label style="text-align:right; display:block;">كود الاشتراك</label>
                    <div class="input-icon">
                        <i class="fas fa-key"></i>
                        <input type="text" id="code-input" placeholder="أدخل الكود الخاص بك (مثال SPD-...)" required
                            autocomplete="off">
                    </div>
                </div>

                <button type="submit" class="btn-primary w-100 mt-20" style="font-size:18px;">تسجيل الدخول</button>
            </form>

            <div class="login-footer">
                <p>ليس لديك كود اشتراك؟</p>
                <button type="button" class="btn-primary w-100"
                    style="background:#25D366; border:none; margin-top:10px;" onclick="requestCode()">
                    <i class="fab fa-whatsapp"></i> طلب كود جديد
                </button>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:var(--primary-color); margin-bottom:20px;">استكمال البيانات</h3>
            <p style="text-align:center; margin-bottom:15px; font-size:14px; color:#555;">أهلاً بك! يرجى استكمال بياناتك
                لفتح الحساب.</p>
            <form onsubmit="completeRegister(event)">
                <div class="form-group">
                    <label>الاسم الرباعي</label>
                    <input type="text" id="reg-name" required placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="reg-phone" required placeholder="مثال: 01012345678">
                </div>
                <div class="form-group">
                    <label>المرحلة الدراسية</label>
                    <select id="reg-stage" onchange="updateRegisterGrades()">
                        <option value="">اختر المرحلة</option>
                        <option value="primary">المرحلة الابتدائية</option>
                        <option value="middle">المرحلة المتوسطة / الإعدادية</option>
                        <option value="secondary_scientific">المرحلة الثانوية - علمي</option>
                        <option value="secondary_literary">المرحلة الثانوية - أدبي</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الصف الدراسي</label>
                    <select id="reg-grade" required>
                        <option value="">اختر المرحلة أولاً</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary w-100 mt-10">حفظ وبدء التعلم</button>
                <button type="button" class="btn-icon"
                    style="position:absolute; top:10px; left:10px; border:none; background:transparent;"
                    onclick="closeRegisterModal()"><i class="fas fa-times"
                        style="color:#d32f2f; font-size:20px;"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const STAGE_MAP = {
            'primary': [
                { name: 'الصف الأول الابتدائي', val: '1' },
                { name: 'الصف الثاني الابتدائي', val: '2' },
                { name: 'الصف الثالث الابتدائي', val: '3' },
                { name: 'الصف الرابع الابتدائي', val: '4' },
                { name: 'الصف الخامس الابتدائي', val: '5' },
                { name: 'الصف السادس الابتدائي', val: '6' }
            ],
            'middle': [
                { name: 'الصف السادس (متوسط)', val: '6' },
                { name: 'الصف السابع', val: '7' },
                { name: 'الصف الثامن', val: '8' },
                { name: 'الصف التاسع', val: '9' }
            ],
            'secondary_scientific': [
                { name: 'الصف العاشر', val: '10' },
                { name: 'الصف الحادي عشر - علمي', val: '11' },
                { name: 'الصف الثاني عشر - علمي', val: '12' }
            ],
            'secondary_literary': [
                { name: 'الصف العاشر (عام/أدبي)', val: '13' },
                { name: 'الصف الحادي عشر - أدبي', val: '14' },
                { name: 'الصف الثاني عشر - أدبي', val: '15' }
            ]
        };

        function updateRegisterGrades() {
            const stage = document.getElementById('reg-stage').value;
            const gradeSelect = document.getElementById('reg-grade');
            gradeSelect.innerHTML = '<option value="">اختر الصف</option>';

            if (stage && STAGE_MAP[stage]) {
                STAGE_MAP[stage].forEach(g => {
                    let opt = document.createElement('option');
                    opt.value = g.val;
                    opt.textContent = g.name;
                    gradeSelect.appendChild(opt);
                });
            }
        }
    </script>
</body>

</html>
